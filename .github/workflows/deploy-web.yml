name: Deploy Web (Cloudflare Workers via OpenNext)

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/shared/**"
      - ".github/workflows/deploy-web.yml"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # @opennextjs/cloudflare menggantikan @cloudflare/next-on-pages yang
      # sudah deprecated. Frontend sekarang deploy sebagai Cloudflare Worker
      # (bukan Cloudflare Pages), lihat docs/deployment.md untuk detail.
      - name: Build dengan OpenNext Cloudflare adapter
        working-directory: apps/web
        run: npx opennextjs-cloudflare build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      # PENTING: jangan pakai cloudflare/wrangler-action@v3 — action itu
      # memasang wrangler 3.90.0 sendiri, padahal repo memakai wrangler v4
      # (konfigurasi assets Workers tidak dipahami wrangler 3, deploy gagal).
      - name: Deploy ke Cloudflare Workers
        working-directory: apps/web
        run: npx wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set secrets di Workers (idempotent)
        working-directory: apps/web
        run: |
          echo "${{ secrets.DATABASE_URL }}" | npx wrangler secret put DATABASE_URL --env production
          echo "${{ secrets.AUTH_SECRET }}" | npx wrangler secret put AUTH_SECRET --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
